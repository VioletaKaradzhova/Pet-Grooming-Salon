<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Paws & Relax | Home</title>
    <link rel="stylesheet" th:href="@{/css/style.css(v=3)}">
</head>
<body>

<div th:replace="~{fragments :: navbar}"></div>

<div class="container">
    <div class="card" style="text-align: center;">
        <h1>Welcome to Paws & Relax! 🐶🧼</h1>
        <p style="font-size: 1.2rem;">The premier spa experience for your furry best friends.</p>
        <br>
        <a th:if="${session.user_id == null}" href="/login" class="btn">Get Started</a>
        <a th:if="${session.user_role == 'CLIENT'}" href="/dashboard" class="btn">My Dashboard</a>
        <a th:if="${session.user_role != null and session.user_role != 'CLIENT'}" href="/admin/dashboard" class="btn">Staff Area</a>
    </div>
</div>

<div th:replace="~{fragments :: footer}"></div>

</body>
</html>
