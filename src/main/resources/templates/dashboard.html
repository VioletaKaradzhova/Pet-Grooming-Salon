<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Paws & Relax | Dashboard</title>
    <link rel="stylesheet" th:href="@{/css/style.css(v=3)}">
</head>
<body>

<div th:replace="~{fragments :: navbar}"></div>

<div class="container">
    <div th:if="${errorMessage != null}" class="alert" th:text="${errorMessage}"></div>

    <h1>My Dashboard</h1>

    <div class="card">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h3>🐕 My Pets</h3>
            <a href="/pets/add" class="btn" style="padding: 8px 15px; font-size: 0.9rem;">+ Add Pet</a>
        </div>

        <p th:if="${pets == null or pets.isEmpty()}">You haven't added any pets yet!</p>
        <ul>
            <li th:each="pet : ${pets}" class="item-row">
                <div>
                    <strong th:text="${pet.name}"></strong> <span th:text="'(' + ${pet.breed} + ')'"></span>
                </div>
                <div style="display: flex; gap: 10px;">
                    <a th:href="@{/pets/{id}/edit(id=${pet.id})}" class="btn" style="padding: 8px 15px; font-size: 0.9rem; background-color: var(--primary-color);">Edit</a>
                    <form th:action="@{/pets/{id}/delete(id=${pet.id})}" method="post" style="margin:0;">
                        <button type="submit" class="btn-danger" onclick="return confirm('Are you sure you want to remove this pet?');">Delete</button>
                    </form>
                </div>
            </li>
        </ul>
    </div>

    <div class="card">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h3>📅 My Appointments</h3>
            <a href="/appointments/book" class="btn" style="padding: 8px 15px; font-size: 0.9rem;">Book Service</a>
        </div>

        <p th:if="${appointments == null or appointments.isEmpty()}">No upcoming appointments.</p>
        <ul>
            <li th:each="appt : ${appointments}" class="item-row">
                <div>
                    <strong th:text="${appt.pet.name}"></strong> -
                    <span th:text="${appt.servicePackage.name}"></span><br>
                    <small style="color: gray;" th:text="${#temporals.format(appt.appointmentDate, 'dd MMM yyyy, HH:mm')}"></small>
                    <span th:text="${' [' + appt.status + ']'}"
                          th:style="${appt.status == 'COMPLETE' ? 'color: green; font-weight: bold;' : (appt.status == 'CANCELLED' ? 'color: red;' : 'color: var(--secondary-color);')}">
                        </span>
                </div>

                <div th:if="${appt.status == 'SCHEDULED'}" style="display: flex; gap: 10px;">
                    <a th:href="@{/appointments/{id}/edit(id=${appt.id})}" class="btn" style="padding: 8px 15px; font-size: 0.9rem;">Edit</a>
                    <form th:action="@{/appointments/{id}/cancel(id=${appt.id})}" method="post" style="margin:0;">
                        <button type="submit" class="btn-danger">Cancel</button>
                    </form>
                </div>
            </li>
        </ul>
    </div>
</div>

<div th:replace="~{fragments :: footer}"></div>

</body>
</html>
