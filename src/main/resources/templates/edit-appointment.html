<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Paws & Relax | Edit Appointment</title>
    <link rel="stylesheet" th:href="@{/css/style.css(v=3)}">
</head>
<body>

<div th:replace="~{fragments :: navbar}"></div>

<div class="container">
    <div class="card" style="max-width: 600px; margin: 0 auto;">
        <h2>Update Appointment</h2>

        <form th:action="@{/appointments/{id}/edit(id=${appointmentId})}" th:object="${appointmentDto}" method="post">

            <div>
                <label>Which Pet?</label>
                <select th:field="*{petId}">
                    <option th:each="pet : ${userPets}" th:value="${pet.id}" th:text="${pet.name} + ' (' + ${pet.breed} + ')'"></option>
                </select>
                <div class="error-text" th:if="${#fields.hasErrors('petId')}" th:errors="*{petId}"></div>
            </div>

            <div>
                <label>Choose a Service</label>
                <select th:field="*{servicePackageId}">
                    <option th:each="pkg : ${servicePackages}" th:value="${pkg.id}" th:text="${pkg.name} + ' - €' + ${#numbers.formatDecimal(pkg.price, 1, 2)}"></option>
                </select>
                <div class="error-text" th:if="${#fields.hasErrors('servicePackageId')}" th:errors="*{servicePackageId}"></div>
            </div>

            <div>
                <label>Date & Time</label>
                <input type="datetime-local" th:field="*{appointmentDate}" />
                <div class="error-text" th:if="${#fields.hasErrors('appointmentDate')}" th:errors="*{appointmentDate}"></div>
            </div>

            <div style="display: flex; gap: 10px; margin-top: 10px;">
                <button type="submit" style="flex: 1;">Update Appointment</button>
                <a href="/dashboard" class="btn" style="flex: 1; background-color: gray; text-align: center;">Cancel</a>
            </div>
        </form>
    </div>
</div>

<div th:replace="~{fragments :: footer}"></div>

</body>
</html>
