<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Paws & Relax | Reschedule</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav>
    <div class="nav-container">
        <a href="/" class="brand">🐾 Paws & Relax</a>
        <ul class="nav-menu">

            <li>
                <a href="/services">Services ▼</a>
                <div class="dropdown-content">
                    <a href="/services/bath-and-brush">Bath & Brush</a>
                    <a href="/services/full-spa">Full Grooming Spa</a>
                    <a href="/services/nail-trim">Nail Trim & File</a>
                    <a href="/services/flea-tick">Flea & Tick Treatment</a>
                    <a href="/services/puppy-trim">Puppy's First Trim</a>
                </div>
            </li>

            <li th:if="${session.user_id == null}"><a href="/login">Login / Register</a></li>
            <li th:if="${session.user_id != null}"><a href="/dashboard">Dashboard</a></li>
            <li th:if="${session.user_role == 'STAFF' or session.user_role == 'MANAGEMENT'}"><a href="/admin/dashboard" style="color: var(--secondary-color);">Admin</a></li>
            <li th:if="${session.user_id != null}"><a href="/logout">Logout</a></li>
        </ul>
    </div>
</nav>

<div class="container">
    <div class="card" style="max-width: 600px; margin: 0 auto;">
        <h2>Reschedule Appointment</h2>

        <form th:action="@{/appointments/{id}/edit(id=${appointmentId})}" th:object="${appointmentDto}" method="post">

            <div>
                <label>New Date & Time</label>
                <input type="datetime-local" th:field="*{appointmentDate}" />
                <div class="error-text" th:if="${#fields.hasErrors('appointmentDate')}" th:errors="*{appointmentDate}"></div>
            </div>

            <input type="hidden" th:field="*{petId}" />
            <input type="hidden" th:field="*{servicePackageId}" />

            <div style="display: flex; gap: 10px; margin-top: 10px;">
                <button type="submit" style="flex: 1;">Update Appointment</button>
                <a href="/dashboard" class="btn" style="flex: 1; background-color: gray; text-align: center;">Cancel</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
