<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Register | Paws & Relax</title>
    <link rel="stylesheet" th:href="@{/css/style.css(v=3)}">
</head>
<body>

<div th:replace="~{fragments :: navbar}"></div>

<div class="container">
    <div th:if="${errorMessage != null}" class="alert" th:text="${errorMessage}"></div>

    <div class="card" style="max-width: 500px; margin: 0 auto;">
        <h2 style="color: var(--primary-color);">Create an Account</h2>
        <p style="text-align: center; margin-bottom: 20px;">Join Paws & Relax to book appointments for your furry friends!</p>

        <form th:action="@{/register}" th:object="${loginDto}" method="post">
            <div>
                <label>Choose a Username</label>
                <input type="text" th:field="*{username}" placeholder="e.g. doglover99" />
                <div class="error-text" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></div>
            </div>

            <div>
                <label>Create a Password</label>
                <input type="password" th:field="*{password}" placeholder="********" />
                <div class="error-text" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
            </div>

            <button type="submit" style="margin-top: 10px; width: 100%; background-color: var(--primary-color);">Register Now</button>
        </form>

        <p style="text-align: center; margin-top: 20px;">
            Already have an account? <a th:href="@{/login}" style="color: var(--secondary-color); font-weight: bold;">Login here</a>
        </p>
    </div>
</div>

<div th:replace="~{fragments :: footer}"></div>

</body>
</html>
