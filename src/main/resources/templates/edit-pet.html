<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Paws & Relax | Edit Pet</title>
    <link rel="stylesheet" th:href="@{/css/style.css(v=3)}">
</head>
<body>

<div th:replace="~{fragments :: navbar}"></div>

<div class="container">
    <div class="card" style="max-width: 500px; margin: 0 auto;">
        <h2>Update Pet Details</h2>
        <form th:action="@{/pets/{id}/edit(id=${petId})}" th:object="${petDto}" method="post">

            <div>
                <label>Pet's Name</label>
                <input type="text" th:field="*{name}" placeholder="e.g. Max" />
                <div class="error-text" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
            </div>

            <div>
                <label>Breed</label>
                <input type="text" th:field="*{breed}" placeholder="e.g. Golden Retriever" />
                <div class="error-text" th:if="${#fields.hasErrors('breed')}" th:errors="*{breed}"></div>
            </div>

            <div style="display: flex; gap: 10px; margin-top: 10px;">
                <button type="submit" style="flex: 1;">Save Changes</button>
                <a href="/dashboard" class="btn" style="flex: 1; background-color: gray; text-align: center;">Cancel</a>
            </div>
        </form>
    </div>
</div>

<div th:replace="~{fragments :: footer}"></div>

</body>
</html>
