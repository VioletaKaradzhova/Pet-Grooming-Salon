<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Paws & Relax | Admin</title>
    <link rel="stylesheet" th:href="@{/css/style.css(v=3)}">
</head>
<body>

<div th:replace="~{fragments :: navbar}"></div>

<div class="container">

    <div th:if="${successMessage != null}" class="alert" style="background-color: #D4EDDA; color: #155724; border: 1px solid #C3E6CB; margin-bottom: 20px;" th:text="${successMessage}"></div>

    <h1 style="color: var(--secondary-color);">Salon Management System</h1>

    <div class="card" th:if="${session.user_role == 'ADMIN' or session.user_role == 'MANAGEMENT'}">
        <h3>🛡️ Create New Employee</h3>
        <div th:if="${employeeCreationError != null}" class="alert" th:text="${employeeCreationError}"></div>

        <form th:action="@{/admin/employees/create}" th:object="${employeeDto}" method="post" style="display: flex; gap: 15px; align-items: flex-end; flex-direction: row; flex-wrap: wrap;">
            <div style="flex: 1; min-width: 200px;">
                <label>Username</label>
                <input type="text" th:field="*{username}" placeholder="username" />
                <div class="error-text" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></div>
            </div>
            <div style="flex: 1; min-width: 200px;">
                <label>Password</label>
                <input type="password" th:field="*{password}" placeholder="********" />
                <div class="error-text" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
            </div>
            <div style="flex: 1; min-width: 200px;">
                <label>Role</label>
                <select th:field="*{role}">
                    <option value="STAFF">STAFF</option>
                    <option th:if="${session.user_role == 'ADMIN'}" value="MANAGEMENT">MANAGEMENT</option>
                </select>
            </div>
            <button type="submit" style="padding: 12px 20px;">Create Account</button>
        </form>
    </div>

    <div class="card">
        <h3>📅 All Salon Appointments</h3>
        <p th:if="${allAppointments == null or allAppointments.isEmpty()}">No appointments scheduled.</p>

        <ul>
            <li th:each="appt : ${allAppointments}" class="item-row">
                <div>
                    <strong th:text="${appt.pet.name} + ' (' + ${appt.pet.owner.username} + ')'"></strong> -
                    <span th:text="${appt.servicePackage.name}"></span><br>
                    <small style="color: gray;" th:text="${#temporals.format(appt.appointmentDate, 'dd MMM yyyy, HH:mm')}"></small>
                    <span th:text="${' [' + appt.status + ']'}"
                          th:style="${appt.status == 'COMPLETE' ? 'color: green; font-weight: bold;' : (appt.status == 'CANCELLED' ? 'color: red;' : 'color: var(--secondary-color);')}">
                        </span>
                </div>

                <div th:if="${appt.status != 'COMPLETE' and appt.status != 'CANCELLED'}">
                    <form th:action="@{/admin/appointments/{id}/status(id=${appt.id})}" method="post" style="display: flex; gap: 10px; flex-direction: row;" onsubmit="return confirmStaffStatusChange(this);">
                        <select name="status" style="padding: 5px; font-size: 0.9rem;">

                            <th:block th:if="${appt.status == 'SCHEDULED'}">
                                <option value="IN_PROGRESS">In Progress</option>
                                <option value="CANCELLED">Cancel</option>
                            </th:block>

                            <th:block th:if="${appt.status == 'IN_PROGRESS'}">
                                <option value="COMPLETE">Complete</option>
                            </th:block>

                        </select>
                        <button type="submit" style="padding: 5px 15px; font-size: 0.9rem;">Update</button>
                    </form>
                </div>
            </li>
        </ul>
    </div>

    <div class="card">
        <h3>👥 Registered System Users</h3>
        <ul>
            <li th:each="user : ${allUsers}" class="item-row">
                <strong th:text="${user.username}"></strong>
                <span th:text="'Role: ' + ${user.role}"
                      th:style="${user.role.name() == 'ADMIN' ? 'color: red; font-weight: bold;' : (user.role.name() != 'CLIENT' ? 'color: var(--secondary-color); font-weight: bold;' : 'color: gray;')}">
                    </span>
            </li>
        </ul>
    </div>
</div>

<div th:replace="~{fragments :: footer}"></div>

<script>
    function confirmStaffStatusChange(form) {
        var selectedStatus = form.elements["status"].value;
        if (selectedStatus === 'CANCELLED') {
            return confirm('Are you sure you want to cancel this appointment?');
        }
        return true;
    }
</script>
</body>
</html>
