<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Paws & Relax | Login</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav>
    <div class="nav-container">
        <a href="/" class="brand">🐾 Paws & Relax</a>
        <ul class="nav-menu">

            <li>
                <a href="/services">Services ▼</a>
                <div class="dropdown-content">
                    <a href="/services/bath-and-brush">Bath & Brush</a>
                    <a href="/services/full-spa">Full Grooming Spa</a>
                    <a href="/services/nail-trim">Nail Trim & File</a>
                    <a href="/services/flea-tick">Flea & Tick Treatment</a>
                    <a href="/services/puppy-trim">Puppy's First Trim</a>
                </div>
            </li>

            <li th:if="${session.user_id == null}"><a href="/login">Login / Register</a></li>
            <li th:if="${session.user_id != null}"><a href="/dashboard">Dashboard</a></li>
            <li th:if="${session.user_role == 'STAFF' or session.user_role == 'MANAGEMENT'}"><a href="/admin/dashboard" style="color: var(--secondary-color);">Admin</a></li>
            <li th:if="${session.user_id != null}"><a href="/logout">Logout</a></li>
        </ul>
    </div>
</nav>

<div class="container">
    <div th:if="${errorMessage != null}" class="alert" th:text="${errorMessage}"></div>

    <div class="card" style="max-width: 500px; margin: 0 auto;">
        <h2>Welcome Back!</h2>

        <form th:object="${loginDto}" method="post">
            <div>
                <label>Username</label>
                <input type="text" th:field="*{username}" placeholder="e.g. doglover99" />
                <div class="error-text" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></div>
            </div>

            <div>
                <label>Password</label>
                <input type="password" th:field="*{password}" placeholder="********" />
                <div class="error-text" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
            </div>

            <div style="display: flex; gap: 10px; margin-top: 10px;">
                <button type="submit" th:formaction="@{/login}" style="flex: 1;">Login</button>
                <button type="submit" th:formaction="@{/register}" style="flex: 1; background-color: var(--primary-color);">Register</button>
            </div>
        </form>
    </div>
</div>
</body>
</html>
