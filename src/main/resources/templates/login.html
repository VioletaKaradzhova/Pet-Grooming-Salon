<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login | Paws & Relax</title>
    <link rel="stylesheet" th:href="@{/css/style.css(v=3)}">
</head>
<body>

<div th:replace="~{fragments :: navbar}"></div>

<div class="container">
    <div th:if="${errorMessage != null}" class="alert" th:text="${errorMessage}"></div>

    <div class="card" style="max-width: 500px; margin: 0 auto;">
        <h2>Welcome Back!</h2>

        <form th:action="@{/login}" th:object="${loginDto}" method="post">
            <div>
                <label>Username</label>
                <input type="text" th:field="*{username}" placeholder="e.g. doglover99" />
                <div class="error-text" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></div>
            </div>

            <div>
                <label>Password</label>
                <input type="password" th:field="*{password}" placeholder="********" />
                <div class="error-text" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
            </div>

            <button type="submit" style="margin-top: 10px; width: 100%;">Login</button>
        </form>

        <p style="text-align: center; margin-top: 20px;">
            Don't have an account? <a th:href="@{/register}" style="color: var(--primary-color); font-weight: bold;">Register here</a>
        </p>
    </div>
</div>

<div th:replace="~{fragments :: footer}"></div>

</body>
</html>
