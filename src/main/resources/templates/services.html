<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Paws & Relax | Our Services</title>
    <link rel="stylesheet" th:href="@{/css/style.css(v=3)}">
</head>
<body>

<div th:replace="~{fragments :: navbar}"></div>

<div class="container">
    <h1>Our Grooming Services</h1>
    <p style="text-align: center; margin-bottom: 30px;">Pamper your pet with our professional care packages.</p>

    <div class="card" th:each="service : ${services}" style="display: flex; justify-content: space-between; align-items: center;">
        <div>
            <h3 th:text="${service.name}" style="margin-bottom: 5px;"></h3>
            <p style="font-size: 1.2rem; font-weight: bold; color: var(--primary-color); margin: 0;" th:text="'€' + ${service.price}"></p>
        </div>

        <div>
            <a th:if="${session.user_id == null}" href="/login" class="btn" style="background-color: gray;">Login to Book</a>

            <a th:if="${session.user_id != null}" href="/appointments/book" class="btn">Book Appointment</a>
        </div>
    </div>
</div>

<div th:replace="~{fragments :: footer}"></div>

</body>
</html>
