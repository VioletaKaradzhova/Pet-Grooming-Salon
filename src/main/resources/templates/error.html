<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Oops! | Paws & Relax</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav>
  <div class="nav-container">
    <a href="/" class="brand">🐾 Paws & Relax</a>
  </div>
</nav>

<div class="container">
  <div class="card" style="text-align: center;">
    <h1 style="color: var(--error-color);">Oh no! 🙀</h1>
    <h2>Something went wrong.</h2>
    <p th:text="${message}">An unexpected error occurred.</p>
    <br>
    <a href="/dashboard" class="btn">Return to Safety</a>
  </div>
</div>
</body>
</html>
