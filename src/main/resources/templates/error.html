<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Oops! | Paws & Relax</title>
  <link rel="stylesheet" th:href="@{/css/style.css(v=3)}">
</head>
<body>

<div th:replace="~{fragments :: navbar}"></div>

<div class="container">
  <div class="card" style="text-align: center;">
    <h1 style="color: var(--error-color);">Oh no! 🙀</h1>
    <h2>Something went wrong.</h2>
    <p th:text="${message}">An unexpected error occurred.</p>
    <br>
    <a href="/dashboard" class="btn">Return to Safety</a>
  </div>
</div>

<div th:replace="~{fragments :: footer}"></div>

</body>
</html>
