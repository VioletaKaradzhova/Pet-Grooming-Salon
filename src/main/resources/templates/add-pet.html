<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Paws & Relax | Add Pet</title>
    <link rel="stylesheet" th:href="@{/css/style.css(v=2)}">
</head>
<body>
<nav>
    <div class="nav-container">
        <a href="/" class="brand">🐾 Paws & Relax</a>
        <ul class="nav-menu">

            <li><a href="/">Home</a></li>
            <li><a href="/about">About</a></li>
            <li><a href="/contact">Contact</a></li>

            <li>
                <a href="/services">Services ▼</a>
                <div class="dropdown-content">
                    <a href="/services/bath-and-brush">Bath & Brush</a>
                    <a href="/services/full-spa">Full Grooming Spa</a>
                    <a href="/services/nail-trim">Nail Trim & File</a>
                    <a href="/services/flea-tick">Flea & Tick Treatment</a>
                    <a href="/services/puppy-trim">Puppy's First Trim</a>
                </div>
            </li>

            <li th:if="${session.user_id == null}"><a href="/login">Login / Register</a></li>
            <li th:if="${session.user_id != null}"><a href="/dashboard">Dashboard</a></li>
            <li th:if="${session.user_role == 'STAFF' or session.user_role == 'MANAGEMENT'}"><a href="/admin/dashboard" style="color: var(--secondary-color);">Admin</a></li>
            <li th:if="${session.user_id != null}"><a href="/logout">Logout</a></li>
        </ul>
    </div>
</nav>

<div class="container">
    <div class="card" style="max-width: 500px; margin: 0 auto;">
        <h2>Register a New Pet</h2>
        <form th:action="@{/pets/add}" th:object="${petDto}" method="post">

            <div>
                <label>Pet's Name</label>
                <input type="text" th:field="*{name}" placeholder="e.g. Max" />
                <div class="error-text" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
            </div>

            <div>
                <label>Breed</label>
                <input type="text" th:field="*{breed}" placeholder="e.g. Golden Retriever" />
                <div class="error-text" th:if="${#fields.hasErrors('breed')}" th:errors="*{breed}"></div>
            </div>

            <button type="submit">Save Pet</button>
        </form>
    </div>
</div>
</body>
</html>
